<script>
/* 상세 페이지 자동 로드 — 건드리지 않아도 돼! */
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const item = DOWNLOAD_DATA.find(d => d.id === id);
const el = document.getElementById('post-content');

if (item) {
  document.title = item.title + ' — iXia';
  el.innerHTML = `
    <header class="post-header">
      <div class="post-meta">
        <span class="post-date">${item.date}</span>
      </div>
      <h1 class="post-title">${item.title}</h1>
    </header>
    <div class="post-body">
      ${item.content}
    </div>
  `;
} else {
  el.innerHTML = '<p class="post-loading">항목을 찾을 수 없습니다.</p>';
}
</script>
