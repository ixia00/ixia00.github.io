<script>
const REPO = 'ixia00/ixia00.github.io';
const FOLDER = '_download';
const el = document.getElementById('post-content');
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug');

async function loadPost() {
  try {
    /* base64 대신 raw URL로 직접 파일 읽기 */
    const rawUrl = `https://raw.githubusercontent.com/${REPO}/main/${FOLDER}/${encodeURIComponent(slug)}.md`;
    const res = await fetch(rawUrl);
    const text = await res.text();

    /* frontmatter 파싱 */
    const match = text.match(/^---\n([\s\S]*?)\n---/);
    const meta = {};
    if (match) {
      match[1].split('\n').forEach(line => {
        const [key, ...val] = line.split(':');
        if (key) meta[key.trim()] = val.join(':').trim().replace(/^'|'$/g, '').replace(/^"|"$/g, '');
      });
    }

    /* 본문 추출 */
    const body = text.replace(/^---[\s\S]*?---\n/, '');

    const d = new Date(meta.date);
    const dateStr = meta.date ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}` : '';

    document.title = (meta.title || slug) + ' — iXia';

    const div = document.createElement('div');
div.innerHTML = body
  .replace(/^<p>\s*<\/p>/gm, '')
  .replace(/\n\n/g, '</p><p>')
  .replace(/\n/g, '<br>');
const html = div.innerHTML;

    el.innerHTML = `
      <header class="post-header">
        <div class="post-meta">
          <span class="post-date">${dateStr}</span>
        </div>
        <h1 class="post-title">${meta.title || slug}</h1>
      </header>
      <div class="post-body">${div.innerHTML}</div>
    `;
  } catch(e) {
    el.innerHTML = '<p class="post-loading">' + e.message + '</p>';
  }
}

loadPost();
</script>
