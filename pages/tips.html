    <!-- 검색창 -->

  <input type="text" id="tips-search" class="tips-search" placeholder="검색어를 입력해주세요" />
  <button class="tips-search-btn" onclick="renderList()" aria-label="검색">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

<script>
/* 글 목록 + 태그 필터 자동 생성 — 건드리지 않아도 돼! */

const listEl = document.getElementById('tips-list');
const tagsEl = document.getElementById('tips-tags');
let activeTag = 'all';

/* 모든 태그 수집 */
const allTags = ['all', ...new Set(TIPS_DATA.flatMap(p => p.tags))];

/* 태그 버튼 생성 */
function renderTags() {
  tagsEl.innerHTML = allTags.map(tag => `
    <button class="tag-btn ${tag === activeTag ? 'active' : ''}" data-tag="${tag}">
      ${tag === 'all' ? 'All' : tag}
    </button>
  `).join('');

  tagsEl.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      activeTag = this.dataset.tag;
      renderTags();
      renderList();
    });
  });
}

/* 글 목록 생성 */
function renderList() {
  const query = document.getElementById('tips-search').value.trim().toLowerCase();
  const filtered = TIPS_DATA.filter(p => {
    const matchTag = activeTag === 'all' || p.tags.includes(activeTag);
    const matchSearch = query === '' || 
      p.title.toLowerCase().includes(query) || 
      p.summary.toLowerCase().includes(query) ||
      p.content.toLowerCase().includes(query);
    return matchTag && matchSearch;
  });

  if (filtered.length === 0) {
    listEl.innerHTML = '<li class="tips-empty">검색 결과가 없습니다.</li>';
    return;
  }

  listEl.innerHTML = filtered.map(post => `
    <li class="tips-item">
      <a href="tips-post.html?id=${post.id}" class="tips-item-link">
        <div class="tips-item-main">
          <p class="tips-item-title">${post.title}</p>
          <p class="tips-item-summary">${post.summary}</p>
          <div class="tips-item-tags">
            ${post.tags.map(t => `<span class="tips-tag">${t}</span>`).join('')}
          </div>
        </div>
        <div class="tips-item-right">
          <span class="tips-item-date">${post.date}</span>
          <span class="tips-item-arrow">→</span>
        </div>
      </a>
    </li>
  `).join('');
}

/* 검색창 입력 시 실시간 반영 */
document.getElementById('tips-search').addEventListener('input', renderList);

renderTags();
renderList();
</script>

</body>
