<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const listEl = document.getElementById('tips-list');
const tagsEl = document.getElementById('tips-tags');
const REPO = 'ixia00/ixia00.github.io';
const FOLDER = '_tips';
let allPosts = [];
let activeTag = 'all';

async function loadPosts() {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FOLDER}`);
    const files = await res.json();
    const mdFiles = files.filter(f => f.name.endsWith('.md') && !f.name.startsWith('.'));

    const posts = await Promise.all(mdFiles.map(async file => {
      const r = await fetch(file.download_url);
      const text = await r.text();
      return parseFrontmatter(text, file.name);
    }));

    allPosts = posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderTags();
    renderList();
  } catch(e) {
    listEl.innerHTML = '<li class="tips-empty">불러오는 중 오류가 발생했습니다.</li>';
  }
}

function parseFrontmatter(text, filename) {
  const match = text.match(/^---\n([\s\S]*?)\n---/);
  const meta = {};
  if (match) {
    match[1].split('\n').forEach(line => {
      const [key, ...val] = line.split(':');
      if (key) meta[key.trim()] = val.join(':').trim().replace(/^'|'$/g, '').replace(/^"|"$/g, '');
    });
  }
  /* 태그 파싱 */
  let tags = [];
  if (meta.tags) {
    try {
      tags = JSON.parse(meta.tags.replace(/'/g, '"'));
    } catch {
      tags = meta.tags.replace(/[\[\]]/g, '').split(',').map(t => t.trim().replace(/^'|'$/g, ''));
    }
  }
  return {
    title: meta.title || filename,
    date: meta.date || '',
    summary: meta.summary || '',
    tags: tags,
    slug: filename.replace('.md', '')
  };
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function renderTags() {
  const allTags = ['all', ...new Set(allPosts.flatMap(p => p.tags))];
  tagsEl.innerHTML = allTags.map(tag => `
    <button class="tag-btn ${tag === activeTag ? 'active' : ''}" data-tag="${tag}">
      ${tag === 'all' ? 'All' : '#' + tag}
    </button>
  `).join('');
  tagsEl.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      activeTag = this.dataset.tag;
      renderTags();
      renderList();
    });
  });
}

function renderList() {
  const query = document.getElementById('tips-search').value.trim().toLowerCase();
  const filtered = allPosts.filter(p => {
    const matchTag = activeTag === 'all' || p.tags.includes(activeTag);
    const matchSearch = query === '' ||
      p.title.toLowerCase().includes(query) ||
      p.summary.toLowerCase().includes(query);
    return matchTag && matchSearch;
  });

  if (filtered.length === 0) {
    listEl.innerHTML = '<li class="tips-empty">검색 결과가 없습니다.</li>';
    return;
  }

  listEl.innerHTML = filtered.map(post => `
    <li class="tips-item">
      <a href="tips-post.html?slug=${post.slug}" class="tips-item-link">
        <div class="tips-item-main">
          <p class="tips-item-title">${post.title}</p>
          <p class="tips-item-summary">${post.summary}</p>
          <div class="tips-item-tags">
            ${post.tags.map(t => `<span class="tips-tag">#${t}</span>`).join('')}
          </div>
        </div>
        <div class="tips-item-right">
          <span class="tips-item-date">${formatDate(post.date)}</span>
          <span class="tips-item-arrow">→</span>
        </div>
      </a>
    </li>
  `).join('');
}

document.getElementById('tips-search').addEventListener('input', renderList);
loadPosts();
</script>
