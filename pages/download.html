<script>
/* 다운로드 목록 자동 생성 — 건드리지 않아도 돼! */
const listEl = document.getElementById('dl-list');

listEl.innerHTML = DOWNLOAD_DATA.map(item => `
  <li class="dl-item">
    <a href="download-post.html?id=${item.id}" class="dl-item-link">
      <div class="dl-item-main">
        <p class="dl-item-title">${item.title}</p>
        <p class="dl-item-summary">${item.summary}</p>
      </div>
      <div class="dl-item-right">
        <span class="dl-item-date">${item.date}</span>
        <span class="dl-item-arrow">→</span>
      </div>
    </a>
  </li>
`).join('');
</script>
